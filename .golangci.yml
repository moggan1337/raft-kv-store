run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - typecheck
    - gocritic
    - gofmt
    - goimports

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/moggan1337/raft-kv-store

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
