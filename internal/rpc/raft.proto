syntax = "proto3";
package raft;
option go_package = "github.com/moggan1337/raft-kv-store/internal/rpc;rpc";

service Raft {
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendRequest) returns (AppendResponse);
  rpc InstallSnapshot(SnapshotRequest) returns (SnapshotResponse);
}

message VoteRequest  { uint64 term = 1; int32 candidate_id = 2; uint64 last_log_index = 3; uint64 last_log_term = 4; }
message VoteResponse { uint64 term = 1; bool vote_granted = 2; }

message Entry { uint64 term = 1; uint64 index = 2; uint32 type = 3; bytes data = 4; }

message AppendRequest  { uint64 term = 1; int32 leader_id = 2; uint64 prev_log_index = 3; uint64 prev_log_term = 4; repeated Entry entries = 5; uint64 leader_commit = 6; }
message AppendResponse { uint64 term = 1; bool success = 2; uint64 match_index = 3; }

message SnapshotRequest  { uint64 term = 1; int32 leader_id = 2; uint64 last_included_index = 3; uint64 last_included_term = 4; bytes data = 5; }
message SnapshotResponse { uint64 term = 1; }
